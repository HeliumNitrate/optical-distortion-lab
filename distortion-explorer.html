<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distortion Function Explorer</title>

<style>

body{
background:#111;
color:#eee;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
margin:0;
padding-top:80px;
}

/* NAVBAR */

.topnav{
position:fixed;
top:0;
left:0;
width:100%;
background:#0b0b0d;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 8%;
border-bottom:1px solid #222;
z-index:100;
}

.logo-link img{
height:48px;
opacity:0.9;
transition:opacity .2s;
}

.logo-link img:hover{
opacity:1;
}

.nav-links a{
margin-left:24px;
color:#aaa;
font-size:0.9rem;
text-decoration:none;
}

.nav-links a:hover{
color:#fff;
}

/* PAGE */

.topbar{
margin:20px 0;
}

.uploadLabel{
display:inline-block;
padding:8px 16px;
border:1px solid #555;
background:#222;
cursor:pointer;
}

.uploadLabel input{
display:none;
}

.main-row{
display:flex;
justify-content:center;
align-items:flex-start;
gap:36px;
flex-wrap:wrap;
}

canvas{
border:1px solid #444;
background:#000;
}

.controls-wrap{
margin-top:26px;
display:flex;
justify-content:center;
}

#controls{
display:grid;
grid-template-columns:repeat(2,minmax(320px,360px));
gap:10px 36px;
}

.control-row{
display:grid;
grid-template-columns:58px 1fr 82px;
align-items:center;
gap:10px;
}

.warning{
margin-top:8px;
font-size:18px;
min-height:24px;
font-weight:bold;
}

.equation{
margin-top:12px;
font-size:18px;
color:cyan;
min-height:28px;
}

.note{
margin-top:8px;
font-size:13px;
color:#aaa;
max-width:460px;
line-height:1.4;
}

.buttons{
display:flex;
justify-content:center;
gap:12px;
margin-top:16px;
flex-wrap:wrap;
}

button{
padding:8px 16px;
cursor:pointer;
border:1px solid #555;
background:#222;
color:#eee;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="topnav">

<a href="index.html" class="logo-link">
<img src="assets/images/logo.png" alt="OpticalDistortionLab logo">
</a>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="index.html#toolbox">Toolbox</a>
<a href="index.html#contact">Contact</a>
</div>

</nav>

<h2>Distortion Function Explorer</h2>

<div class="topbar">
<label class="uploadLabel">
Choose Image
<input type="file" id="upload" accept="image/*">
</label>
</div>

<div class="main-row">

<div>
<canvas id="imageCanvas"></canvas>
<br>
<label>
<input type="checkbox" id="gridToggle"> Show Grid
</label>
</div>

<div>

<canvas id="graphCanvas" width="460" height="320"></canvas>

<div class="equation" id="equation"></div>
<div class="warning" id="warning"></div>

<div class="note">
Distortion is applied in normalized image coordinates.
Real camera distortion also depends on focal length and calibration parameters.
</div>

</div>

</div>

<div class="controls-wrap">
<div id="controls"></div>
</div>

<div class="buttons">
<button id="resetBtn">Reset</button>
<button id="redrawBtn">Redraw</button>
</div>

<div class="buttons">
<button onclick="presetIdentity()">Identity</button>
<button onclick="presetExample1()">Example 1</button>
<button onclick="presetExample2()">Example 2</button>
<button onclick="presetFolding()">Folding</button>
</div>

<script>

const imgCanvas=document.getElementById("imageCanvas");
const imgCtx=imgCanvas.getContext("2d",{willReadFrequently:true});

const graphCanvas=document.getElementById("graphCanvas");
const gctx=graphCanvas.getContext("2d");

const upload=document.getElementById("upload");
const gridToggle=document.getElementById("gridToggle");

const equationDiv=document.getElementById("equation");
const warningDiv=document.getElementById("warning");
const controlsDiv=document.getElementById("controls");

const resetBtn=document.getElementById("resetBtn");
const redrawBtn=document.getElementById("redrawBtn");

const TERM_COUNT=4;

const sliders=[];
const powers=[];

let loadedImg=new Image();
let originalPixels=null;
let imgLoaded=false;
let redrawTimer=null;

/* CONTROLS */

function buildControls(){

for(let i=0;i<TERM_COUNT;i++){

const row=document.createElement("div");
row.className="control-row";

const label=document.createElement("span");
label.textContent="c"+(i+1);

const slider=document.createElement("input");
slider.type="range";
slider.min="-2";
slider.max="2";
slider.step="0.01";
slider.value="0";

const select=document.createElement("select");

for(let p=2;p<=12;p++){

const opt=document.createElement("option");
opt.value=p;
opt.textContent="r^"+p;
select.appendChild(opt);

}

select.value=i+2;

row.appendChild(label);
row.appendChild(slider);
row.appendChild(select);

controlsDiv.appendChild(row);

sliders.push(slider);
powers.push(select);

slider.addEventListener("input",scheduleRender);
slider.addEventListener("change",updateAll);
select.addEventListener("change",updateAll);

}

}

/* DISTORTION FUNCTION */

function f(r){

let sum=r;

for(let i=0;i<TERM_COUNT;i++){

const c=parseFloat(sliders[i].value);
const p=parseInt(powers[i].value);

sum+=c*Math.pow(r,p);

}

return sum;

}

/* GRAPH */

function drawGraph(){

const w=graphCanvas.width;
const h=graphCanvas.height;

const left=50;
const bottom=30;
const top=10;
const right=10;

const pw=w-left-right;
const ph=h-top-bottom;

const rMax=1.5;

let yMin=0;
let yMax=1;

for(let r=0;r<=rMax;r+=0.01){

const y=f(r);
yMin=Math.min(yMin,y);
yMax=Math.max(yMax,y);

}

const mapX=r=>left+(r/rMax)*pw;
const mapY=y=>top+ph-((y-yMin)/(yMax-yMin))*ph;

gctx.clearRect(0,0,w,h);

/* distortion curve */

gctx.strokeStyle="cyan";
gctx.lineWidth=2;
gctx.beginPath();

for(let r=0;r<=rMax;r+=0.005){

const px=mapX(r);
const py=mapY(f(r));

if(r===0) gctx.moveTo(px,py);
else gctx.lineTo(px,py);

}

gctx.stroke();

/* identity */

gctx.strokeStyle="rgba(255,255,255,0.35)";
gctx.beginPath();

for(let r=0;r<=rMax;r+=0.01){

const px=mapX(r);
const py=mapY(r);

if(r===0) gctx.moveTo(px,py);
else gctx.lineTo(px,py);

}

gctx.stroke();

/* r=1 */

const edgeX=mapX(1);

gctx.strokeStyle="yellow";
gctx.beginPath();
gctx.moveTo(edgeX,top);
gctx.lineTo(edgeX,top+ph);
gctx.stroke();

}

/* FORWARD DISTORTION */

function forwardRender(){

if(!imgLoaded) return;

const width=imgCanvas.width;
const height=imgCanvas.height;

const src=originalPixels.data;

const accum=new Float32Array(width*height*4);
const weights=new Float32Array(width*height);

const cx=width/2;
const cy=height/2;
const scale=Math.max(cx,cy);

for(let ys=0;ys<height;ys++)
for(let xs=0;xs<width;xs++){

const nx=(xs-cx)/scale;
const ny=(ys-cy)/scale;

const r=Math.sqrt(nx*nx+ny*ny);
const rd=f(r);

let factor=r<1e-12?1:rd/r;

const xd=nx*factor;
const yd=ny*factor;

const px=xd*scale+cx;
const py=yd*scale+cy;

const x0=Math.floor(px);
const y0=Math.floor(py);

const si=(ys*width+xs)*4;

function splat(x,y){

if(x<0||x>=width||y<0||y>=height) return;

const idx=(y*width+x)*4;

accum[idx]+=src[si];
accum[idx+1]+=src[si+1];
accum[idx+2]+=src[si+2];
weights[y*width+x]+=1;

}

splat(x0,y0);

}

const img=imgCtx.createImageData(width,height);

for(let i=0;i<width*height;i++){

const w=weights[i];
const di=i*4;

if(w>0){

img.data[di]=accum[di]/w;
img.data[di+1]=accum[di+1]/w;
img.data[di+2]=accum[di+2]/w;
img.data[di+3]=255;

}

}

imgCtx.putImageData(img,0,0);

}

/* UPDATE */

function updateAll(){

drawGraph();
forwardRender();

}

function scheduleRender(){

drawGraph();
clearTimeout(redrawTimer);
redrawTimer=setTimeout(forwardRender,90);

}

/* PRESETS */

function resetAll(){

for(let i=0;i<TERM_COUNT;i++){

sliders[i].value=0;
powers[i].value=i+2;

}

updateAll();

}

function presetIdentity(){resetAll();}

function presetExample1(){

resetAll();
sliders[0].value=-0.35;
powers[0].value=3;
sliders[1].value=0.15;
powers[1].value=5;

updateAll();

}

function presetExample2(){

resetAll();
sliders[0].value=0.35;
powers[0].value=3;
sliders[1].value=-0.15;
powers[1].value=5;

updateAll();

}

function presetFolding(){

resetAll();
sliders[0].value=1.2;
powers[0].value=3;
sliders[1].value=-1.0;
powers[1].value=5;

updateAll();

}

/* IMAGE LOAD */

upload.addEventListener("change",function(e){

const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(ev){

loadedImg.onload=function(){

const maxW=760;
const maxH=580;

const scale=Math.min(maxW/loadedImg.width,maxH/loadedImg.height,1);

imgCanvas.width=Math.round(loadedImg.width*scale);
imgCanvas.height=Math.round(loadedImg.height*scale);

imgCtx.drawImage(loadedImg,0,0,imgCanvas.width,imgCanvas.height);

originalPixels=imgCtx.getImageData(0,0,imgCanvas.width,imgCanvas.height);

imgLoaded=true;

updateAll();

};

loadedImg.src=ev.target.result;

};

reader.readAsDataURL(file);

});

resetBtn.onclick=resetAll;
redrawBtn.onclick=updateAll;

buildControls();
drawGraph();

</script>

</body>
</html>
